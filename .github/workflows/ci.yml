name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Runs on a self-hosted runner. Note: this is a PUBLIC repo, so a fork pull request executes on your
# infrastructure once its workflow run is approved. Keep the runner ephemeral and network-isolated, and
# keep "require approval for all outside collaborators" on in Settings > Actions.
permissions:
  contents: read

jobs:
  lint:
    name: Lint (Go)
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2

  backend:
    name: Backend (Go)
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

      - name: Build (CGO disabled — distroless parity)
        run: CGO_ENABLED=0 go build ./cmd/...

  frontend:
    name: Frontend (web)
    runs-on: self-hosted
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm run typecheck

      - name: Build
        run: pnpm build
